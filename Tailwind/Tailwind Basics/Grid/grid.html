<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>GRID</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <main class="h-screen w-screen flex items-center justify-center">
      <section
        class="h-[90%] w-[80%] border-[3px] border-red-500 grid justify-center content-center grid-cols-1 grid-rows-8 gap-[5%] overflow-y-auto md:grid-cols-2 md:grid-rows-4 lg:grid-cols-3 lg:grid-rows-3"
      >
        <div class="border-2 border-green-700"></div>
        <div class="border-2 border-green-700"></div>
        <div class="border-2 border-green-700"></div>
        <div class="border-2 border-green-700"></div>
        <div class="border-2 border-green-700"></div>
        <div class="border-2 border-green-700"></div>
        <div class="border-2 border-green-700"></div>
        <div class="border-2 border-green-700"></div>
      </section>
    </main>
  </body>
</html>
