<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Layout</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        height: 100vh;
        width: 100vw;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      main {
        height: 90%;
        width: 90%;
        border: 5px solid rgb(111, 162, 9);
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(5, 1fr);
        gap: 5px;
      }
      div {
        border: 2px solid red;
      }
      #one,
      #three {
        grid-column: 1/3;
      }
      #two {
        grid-row: 1/4;
        grid-column: 3/4;
      }
      #seven {
        grid-column: 1/3;
        grid-row: 4/6;
      }
    </style>
  </head>
  <body>
    <main>
      <div id="one">1</div>
      <div id="two">2</div>
      <div id="three">3</div>
      <div id="four">4</div>
      <div id="five">5</div>
      <div id="six">6</div>
      <div id="seven">7</div>
      <div id="eight">8</div>
    </main>
  </body>
</html>
