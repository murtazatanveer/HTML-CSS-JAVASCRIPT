<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Queries</title>
  </head>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    main {
      display: flex;
      flex-direction: column;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-evenly;
      border: 4px solid orangered;
      height: 50%;
      width: 70%;
    }
    div {
      width: 40%;
      border: 2px solid green;
      flex-basis: 27%;
    }

    @media (orientation: portrait) {
      main {
        height: 95%;
        flex-wrap: nowrap;
      }
      div {
        flex-basis: 13%;
        width: 80%;
      }
    }
  </style>
  <body>
    <main>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </main>
  </body>
</html>
